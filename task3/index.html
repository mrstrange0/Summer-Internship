<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 3 - Advanced Styling and JavaScript</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Advanced Styling and JavaScript</h1>
    <p>Responsive Design | Image Carousel | API Fetch</p>
  </header>

  <!-- Step 1: Responsive cards using media queries -->
  <section class="cards-section">
    <h2>Responsive Cards</h2>
    <div class="cards">
      <div class="card">Card 1</div>
      <div class="card">Card 2</div>
      <div class="card">Card 3</div>
    </div>
  </section>

  <!-- Step 2: Image Carousel -->
  <section class="carousel-section">
    <h2>Image Carousel</h2>
    <div class="carousel">
      <img id="carousel-img" src="https://picsum.photos/id/1015/500/300" alt="carousel image">
      <div class="carousel-btns">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>
  </section>

  <!-- Step 3: Fetch data from API -->
  <section class="joke-section">
    <h2>Random Joke Generator</h2>
    <button id="jokeBtn">Get a Joke</button>
    <p id="jokeText">Click the button to fetch a joke!</p>
  </section>



  <script src="script.js"></script>
</body>
</html>
