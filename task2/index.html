<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 2 | Intermediate HTML, CSS & JavaScript</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Flexbox navigation -->
  <header class="navbar">
    <div class="logo">Task<span>Two</span></div>
    <nav>
      <ul>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#todo">To-Do</a></li>
      </ul>
    </nav>
  </header>

  <!-- CSS Grid layout -->
  <main class="layout">

    <section id="contact" class="card">
      <h2>Contact Us</h2>
      <p class="subtitle">Fill the form below, everything is validated with JavaScript.</p>

      <form id="contactForm" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name">
          <span class="error" id="nameError"></span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com">
          <span class="error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4" placeholder="Write your message..."></textarea>
          <span class="error" id="messageError"></span>
        </div>

        <button type="submit">Submit</button>
        <p class="success" id="formSuccess"></p>
      </form>
    </section>

    <section id="todo" class="card">
      <h2>To-Do List</h2>
      <p class="subtitle">Add tasks and remove them once done.</p>

      <div class="todo-input">
        <input type="text" id="todoText" placeholder="Add a new task...">
        <button id="addTodoBtn">Add</button>
      </div>

      <ul id="todoList" class="todo-list"></ul>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 TaskTwo &mdash; built with HTML, CSS and JavaScript.</p>
  </footer>

<script src="script.js"></script>
</body>
</html>
