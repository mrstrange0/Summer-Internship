<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy - Capstone Project</title>
<link rel="stylesheet" href="style.min.css">
</head>
<body>

  <header>
    <h1>🛒 ShopEasy</h1>
    <div class="cart-info" id="cartInfo">Cart: 0 items | ₹0</div>
  </header>

  <section class="hero">
    <h2>Simple. Fast. Reliable Shopping.</h2>
    <p>A mini e-commerce web app built with HTML, CSS & JavaScript.</p>
  </section>

  <section class="controls">
    <input type="text" id="searchInput" placeholder="Search products...">

    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="Electronics">Electronics</option>
      <option value="Clothing">Clothing</option>
      <option value="Books">Books</option>
    </select>

    <select id="sortBy">
      <option value="none">Sort By</option>
      <option value="priceLow">Price: Low to High</option>
      <option value="priceHigh">Price: High to Low</option>
      <option value="rating">Rating</option>
    </select>
  </section>

  <section class="product-grid" id="productGrid"></section>

  <!-- Cart Panel -->
  <aside id="cartPanel" class="cart-panel">
    <h2>Your Cart</h2>
    <ul id="cartList"></ul>
    <p id="cartTotal">Total: ₹0</p>
    <button id="clearCartBtn">Clear Cart</button>
    <button id="closeCartBtn">Close</button>
  </aside>

  <footer id="contact">
    <h2>Contact Us</h2>
    <p>Email: support@shopeasy.com | Phone: +91 9145898941</p>
    <p>&copy; 2026 ShopEasy - Capstone Project by Amit Shyoran</p>
  </footer>

  <script src="script.min.js" defer></script>
</body>
</html>
